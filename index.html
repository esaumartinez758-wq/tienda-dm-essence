<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        .catalogo { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .producto { border: 1px solid #333; padding: 15px; border-radius: 8px; }
        .btn-whatsapp { 
            background: #25d366; color: white; padding: 10px 20px; 
            text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>MD Essence</h1>
    
    <div class="catalogo">
        <div class="producto">
            <h3>Nombre del Perfume</h3>
            <p>Precio: $XXX MXN</p>
            <a href="https://wa.me/529632652207?text=Hola, quiero comprar el perfume..." class="btn-whatsapp">Comprar por WhatsApp</a>
        </div>
    </div>

</body>
</html>
